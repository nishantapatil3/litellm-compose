version: '3'

tasks:
  default:
    desc: Show available commands
    cmds:
      - task --list

  up:
    desc: Start the services
    cmds:
      - docker-compose up -d
      - |
        echo ""
        echo "=========================================="
        echo "  Services started successfully!"
        echo "=========================================="
        echo ""
        echo "  LiteLLM Proxy UI: http://localhost:4000/ui/"
        echo "  Username: $(grep UI_USERNAME .env | cut -d '=' -f2)"
        echo "  Password: $(grep UI_PASSWORD .env | cut -d '=' -f2)"
        echo ""
        echo "=========================================="

  down:
    desc: Stop the services
    cmds:
      - docker-compose down

  down-volumes:
    desc: Stop the services and remove volumes
    cmds:
      - docker-compose down -v

  logs:
    desc: View logs (use -f to follow)
    cmds:
      - docker-compose logs {{.CLI_ARGS}} -f
