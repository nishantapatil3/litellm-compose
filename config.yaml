# LiteLLM Configuration File
# Uncomment and customize as needed

model_list:
  # NVIDIA NIM Models
  # Rank: 10
  - model_name: nvidia_nim/z-ai/glm-5.1
    litellm_params:
      model: nvidia_nim/z-ai/glm-5.1
      api_key: os.environ/NVIDIA_NIM_API_KEY
  # Rank: 45
  - model_name: nvidia_nim/qwen/qwen3.5-397b-a17b
    litellm_params:
      model: nvidia_nim/qwen/qwen3.5-397b-a17b
      api_key: os.environ/NVIDIA_NIM_API_KEY

# Router settings
# router_settings:
#   routing_strategy: least-busy
#   num_retries: 3
#   timeout: 300

# General settings
litellm_settings:
  drop_params: true
  set_verbose: false
  # json_logs: true

# General settings
general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  store_model_in_db: true
  store_prompts_in_spend_logs: true

# Success callback (for logging/monitoring)
# success_callback: ["prometheus"]

# Environment variables (loaded from .env file)
# environment_variables:
#   OPENAI_API_KEY: os.environ/OPENAI_API_KEY
#   ANTHROPIC_API_KEY: os.environ/ANTHROPIC_API_KEY
